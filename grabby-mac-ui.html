
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grabby — Data Harvest & RSS Aggregator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --mac-bg: #f5f5f7;
            --mac-sidebar: rgba(235, 235, 235, 0.7);
            --mac-border: rgba(0, 0, 0, 0.1);
            --accent: #007aff;
            --accent-gradient: linear-gradient(135deg, #007aff 0%, #00c6ff 100%);
        }

        .dark {
            --mac-bg: #1a1a1a;
            --mac-sidebar: rgba(35, 35, 35, 0.7);
            --mac-border: rgba(255, 255, 255, 0.1);
            --accent: #0a84ff;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            background: var(--mac-bg);
            margin: 0;
            padding: 0;
        }

        .sidebar-vibrancy {
            backdrop-filter: blur(40px) saturate(200%);
            background-color: var(--mac-sidebar);
            border-right: 1px solid var(--mac-border);
        }

        .mac-window {
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.25), 0 18px 36px -18px rgba(0, 0, 0, 0.3);
            border: 1px solid var(--mac-border);
        }

        .traffic-light {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .news-card-hover {
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .news-card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -10px rgba(0, 0, 0, 0.1);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease forwards;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6 md:p-12 overflow-hidden">
    <div id="root" class="w-full h-full max-w-7xl max-h-[900px] flex overflow-hidden mac-window rounded-2xl bg-white dark:bg-[#1e1e1e]">
        <!-- App content injected here -->
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [activeCategory, setActiveCategory] = useState('All');
            const [searchQuery, setSearchQuery] = useState('');
            const [isDarkMode, setIsDarkMode] = useState(false);

            useEffect(() => {
                if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    setIsDarkMode(true);
                    document.documentElement.classList.add('dark');
                }
            }, []);

            const feeds = [
                { id: 1, title: 'GPT-4o: Reasoning across audio, vision, and text in real-time', source: 'OpenAI', time: '1h ago', score: 99, category: 'Models', summary: 'A single model trained end-to-end across text, vision, and audio, meaning that all inputs and outputs are processed by the same neural network.', image: 'https://images.unsplash.com/photo-1677442136019-21780ecad995?w=400&q=80' },
                { id: 2, title: 'Claude 3.5 Sonnet sets new industry benchmarks', source: 'Anthropic', time: '3h ago', score: 96, category: 'Models', summary: 'Claude 3.5 Sonnet raises the industry bar for intelligence, outperforming competitor models and Claude 3 Opus on a wide range of evaluations.', image: 'https://images.unsplash.com/photo-1620712943543-bcc4638d9f8e?w=400&q=80' },
                { id: 3, title: 'Scaling Laws for Autoregressive Generative Modeling', source: 'Research', time: '5h ago', score: 91, category: 'Academic', summary: 'New empirical research suggests that performance scales predictably with compute, data size, and parameter count over many orders of magnitude.', image: 'https://images.unsplash.com/photo-1635070041078-e363dbe005cb?w=400&q=80' },
                { id: 4, title: 'The Rise of Agentic Workflows in Enterprise AI', source: 'VentureBeat', time: '8h ago', score: 88, category: 'Industry', summary: 'Companies are moving beyond simple chatbots to autonomous agents that can plan, use tools, and collaborate to solve complex business problems.', image: 'https://images.unsplash.com/photo-1485827404703-89b55fcc595e?w=400&q=80' },
                { id: 5, title: 'Mistral releases Codestral: First open-weight code model', source: 'Mistral AI', time: '12h ago', score: 94, category: 'Dev', summary: 'Codestral is a 22B parameter model designed specifically for code generation tasks, supporting 80+ programming languages.', image: 'https://images.unsplash.com/photo-1587620962725-abab7fe55159?w=400&q=80' },
                { id: 6, title: 'Stable Diffusion 3: Transforming Image Generation', source: 'Stability AI', time: '1d ago', score: 93, category: 'Creative', summary: 'The latest version uses a Diffusion Transformer architecture to achieve superior quality in typography and prompt adherence.', image: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=400&q=80' },
                { id: 7, title: 'Apple Intelligence: AI for the rest of us', source: 'Apple Newsroom', time: '1d ago', score: 97, category: 'Consumer', summary: 'Apple announces a personal intelligence system for iPhone, iPad, and Mac that combines generative models with personal context.', image: 'https://images.unsplash.com/photo-1611186871348-b1ec696e5237?w=400&q=80' },
                { id: 8, title: 'How Llama 3 became the most popular open model', source: 'Meta AI', time: '2d ago', score: 95, category: 'Open Source', summary: 'The community adoption of Llama 3 has surpassed all previous records, driving innovation in local LLM deployments.', image: 'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=400&q=80' },
                { id: 9, title: 'The Future of Search: Answer Engines vs Blue Links', source: 'Search Engine Land', time: '2d ago', score: 84, category: 'Industry', summary: 'As Perplexity and OpenAI challenge Google, the core business model of the internet is being questioned.', image: 'https://images.unsplash.com/photo-1507413245164-6160d8298b31?w=400&q=80' }
            ];

            const filteredFeeds = useMemo(() => {
                return feeds.filter(f => 
                    (activeCategory === 'All' || f.category === activeCategory) &&
                    (f.title.toLowerCase().includes(searchQuery.toLowerCase()) || f.summary.toLowerCase().includes(searchQuery.toLowerCase()))
                );
            }, [activeCategory, searchQuery]);

            return (
                <div className="flex w-full h-full">
                    {/* SIDEBAR */}
                    <aside className="w-72 sidebar-vibrancy flex flex-col z-20">
                        {/* Traffic Lights Area */}
                        <div className="h-14 flex items-center px-5 gap-2">
                            <div className="traffic-light bg-[#ff5f57] border border-black/10"></div>
                            <div className="traffic-light bg-[#febc2e] border border-black/10"></div>
                            <div className="traffic-light bg-[#28c840] border border-black/10"></div>
                        </div>

                        {/* Search & Navigation */}
                        <div className="flex-1 px-4 py-2 space-y-8 overflow-y-auto">
                            <div className="space-y-1">
                                <h3 className="px-3 py-2 text-[11px] font-bold text-gray-500 dark:text-zinc-500 uppercase tracking-widest">Workspace</h3>
                                <nav className="space-y-0.5">
                                    <SidebarItem icon="Zap" label="Today" active={activeCategory === 'All'} onClick={() => setActiveCategory('All')} badge="24" />
                                    <SidebarItem icon="Star" label="Starred" />
                                    <SidebarItem icon="Clock" label="Reading List" />
                                    <SidebarItem icon="Layers" label="Collections" />
                                </nav>
                            </div>

                            <div className="space-y-1">
                                <h3 className="px-3 py-2 text-[11px] font-bold text-gray-500 dark:text-zinc-500 uppercase tracking-widest">Categories</h3>
                                <nav className="space-y-0.5">
                                    <SidebarItem icon="Cpu" label="Models" active={activeCategory === 'Models'} onClick={() => setActiveCategory('Models')} />
                                    <SidebarItem icon="BookOpen" label="Academic" active={activeCategory === 'Academic'} onClick={() => setActiveCategory('Academic')} />
                                    <SidebarItem icon="Code" label="Dev" active={activeCategory === 'Dev'} onClick={() => setActiveCategory('Dev')} />
                                    <SidebarItem icon="Compass" label="Industry" active={activeCategory === 'Industry'} onClick={() => setActiveCategory('Industry')} />
                                    <SidebarItem icon="Image" label="Creative" active={activeCategory === 'Creative'} onClick={() => setActiveCategory('Creative')} />
                                </nav>
                            </div>

                            <div className="space-y-1">
                                <h3 className="px-3 py-2 text-[11px] font-bold text-gray-500 dark:text-zinc-500 uppercase tracking-widest">Channels</h3>
                                <nav className="space-y-0.5">
                                    <div className="flex items-center gap-3 px-3 py-1.5 text-sm text-gray-600 dark:text-zinc-400 hover:bg-black/5 dark:hover:bg-white/5 rounded-lg cursor-pointer">
                                        <div className="w-2 h-2 rounded-full bg-orange-500"></div>
                                        <span>OpenAI Blog</span>
                                    </div>
                                    <div className="flex items-center gap-3 px-3 py-1.5 text-sm text-gray-600 dark:text-zinc-400 hover:bg-black/5 dark:hover:bg-white/5 rounded-lg cursor-pointer">
                                        <div className="w-2 h-2 rounded-full bg-blue-500"></div>
                                        <span>arXiv:AI</span>
                                    </div>
                                    <div className="flex items-center gap-3 px-3 py-1.5 text-sm text-gray-600 dark:text-zinc-400 hover:bg-black/5 dark:hover:bg-white/5 rounded-lg cursor-pointer">
                                        <div className="w-2 h-2 rounded-full bg-green-500"></div>
                                        <span>Mistral.ai</span>
                                    </div>
                                </nav>
                            </div>
                        </div>

                        {/* User & Settings */}
                        <div className="p-4 border-t border-black/5 dark:border-white/5 space-y-2">
                            <div className="flex items-center gap-3 p-2 hover:bg-black/5 dark:hover:bg-white/5 rounded-xl cursor-pointer">
                                <img src="https://ui-avatars.com/api/?name=Grabby+User&background=007aff&color=fff" className="w-8 h-8 rounded-full" />
                                <div className="flex-1 min-w-0">
                                    <p className="text-sm font-semibold truncate">Grabby Pro</p>
                                    <p className="text-[10px] text-gray-500">Premium Plan</p>
                                </div>
                                <i data-lucide="settings" className="w-4 h-4 text-gray-400"></i>
                            </div>
                        </div>
                    </aside>

                    {/* MAIN CONTENT AREA */}
                    <main className="flex-1 flex flex-col bg-white dark:bg-[#121212] relative overflow-hidden">
                        {/* Header Bar */}
                        <header className="h-14 flex items-center justify-between px-8 border-b border-black/5 dark:border-white/5 bg-white/80 dark:bg-[#121212]/80 backdrop-blur-md sticky top-0 z-10">
                            <div className="flex items-center gap-4">
                                <h2 className="text-xl font-bold tracking-tight">{activeCategory === 'All' ? 'Everything' : activeCategory}</h2>
                                <div className="h-4 w-[1px] bg-gray-300 dark:bg-zinc-700 mx-1"></div>
                                <span className="text-sm text-gray-500 font-medium">{filteredFeeds.length} items found</span>
                            </div>

                            <div className="flex items-center gap-4">
                                <div className="relative group">
                                    <i data-lucide="search" className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
                                    <input 
                                        type="text" 
                                        placeholder="Quick Search..." 
                                        className="bg-gray-100 dark:bg-zinc-800 border-none rounded-full px-10 py-1.5 text-sm w-72 focus:ring-2 focus:ring-blue-500/20 focus:bg-white dark:focus:bg-zinc-900 transition-all outline-none"
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                    />
                                    <span className="absolute right-3 top-1/2 -translate-y-1/2 text-[10px] font-bold text-gray-400 border border-gray-300 dark:border-zinc-700 px-1 rounded">⌘K</span>
                                </div>
                                <button className="p-2 hover:bg-gray-100 dark:hover:bg-zinc-800 rounded-lg transition-colors">
                                    <i data-lucide="layout-grid" className="w-4 h-4"></i>
                                </button>
                                <button className="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-full text-sm font-bold shadow-lg shadow-blue-500/20 transition-all active:scale-95 flex items-center gap-2">
                                    <i data-lucide="plus-circle" className="w-4 h-4"></i>
                                    Harvest New
                                </button>
                            </div>
                        </header>

                        {/* Scrollable Grid */}
                        <div className="flex-1 overflow-y-auto p-8 bg-[#fafafa] dark:bg-[#121212]">
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {filteredFeeds.map((feed, idx) => (
                                    <div key={feed.id} className="animate-fade-in" style={{ animationDelay: `${idx * 50}ms` }}>
                                        <NewsCard {...feed} />
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Bottom Status Bar */}
                        <footer className="h-8 border-t border-black/5 dark:border-white/5 flex items-center justify-between px-6 bg-white dark:bg-[#121212] text-[10px] text-gray-400 font-medium">
                            <div className="flex items-center gap-4">
                                <div className="flex items-center gap-1.5">
                                    <div className="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
                                    <span>Engine Online</span>
                                </div>
                                <span>Updated 4 mins ago</span>
                            </div>
                            <div className="flex items-center gap-4">
                                <span>API 2.4.0</span>
                                <span className="text-blue-500 cursor-pointer hover:underline">Support</span>
                            </div>
                        </footer>
                    </main>
                </div>
            );
        };

        const SidebarItem = ({ icon, label, active, onClick, badge }) => (
            <button 
                onClick={onClick}
                className={`w-full flex items-center justify-between px-3 py-1.5 rounded-lg text-sm transition-all duration-200 group ${
                    active 
                    ? 'bg-white dark:bg-white/10 shadow-sm text-blue-600 dark:text-blue-400 font-bold' 
                    : 'text-gray-600 dark:text-zinc-400 hover:bg-black/5 dark:hover:bg-white/5'
                }`}
            >
                <div className="flex items-center gap-3">
                    <i data-lucide={icon.toLowerCase()} className={`w-4 h-4 ${active ? 'text-blue-600 dark:text-blue-400' : 'text-gray-400 dark:text-zinc-500 group-hover:text-gray-600 dark:group-hover:text-zinc-300'} transition-colors`}></i>
                    <span>{label}</span>
                </div>
                {badge && (
                    <span className={`text-[10px] px-1.5 py-0.5 rounded-md font-bold ${
                        active ? 'bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400' : 'bg-black/5 dark:bg-white/10 text-gray-400'
                    }`}>
                        {badge}
                    </span>
                )}
            </button>
        );

        const NewsCard = ({ title, source, time, score, category, summary, image }) => {
            const [showDetail, setShowDetail] = useState(false);

            return (
                <div 
                    onClick={() => setShowDetail(true)}
                    className="group flex flex-col h-full bg-white dark:bg-[#1c1c1e] rounded-2xl overflow-hidden border border-black/[0.04] dark:border-white/[0.04] news-card-hover cursor-pointer"
                >
                    {/* Image Area */}
                    <div className="relative h-48 overflow-hidden">
                        <img 
                            src={image} 
                            alt={title} 
                            className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105"
                        />
                        <div className="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                        <div className="absolute top-4 left-4">
                            <span className="bg-white/90 dark:bg-black/90 backdrop-blur px-2.5 py-1 rounded-full text-[10px] font-bold tracking-tight shadow-sm">
                                {category}
                            </span>
                        </div>
                        <div className="absolute top-4 right-4">
                            <div className="bg-white/90 dark:bg-black/90 backdrop-blur p-1.5 rounded-full shadow-sm hover:scale-110 transition-transform">
                                <i data-lucide="star" className="w-3.5 h-3.5 text-gray-400 hover:text-yellow-500"></i>
                            </div>
                        </div>
                    </div>

                    {/* Content Area */}
                    <div className="p-6 flex-1 flex flex-col">
                        <div className="flex items-center justify-between mb-3">
                            <div className="flex items-center gap-2">
                                <div className="w-5 h-5 rounded-md bg-gray-100 dark:bg-zinc-800 flex items-center justify-center font-bold text-[10px] text-blue-600">
                                    {source[0]}
                                </div>
                                <span className="text-[11px] font-bold text-gray-500 dark:text-zinc-500 uppercase tracking-tighter">{source}</span>
                            </div>
                            <span className="text-[10px] font-medium text-gray-400">{time}</span>
                        </div>

                        <h3 className="text-lg font-bold leading-tight mb-3 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">
                            {title}
                        </h3>

                        <p className="text-sm text-gray-500 dark:text-zinc-400 line-clamp-3 mb-6 flex-1">
                            {summary}
                        </p>

                        <div className="flex items-center justify-between pt-4 border-t border-black/5 dark:border-white/5">
                            <div className="flex items-center gap-1.5">
                                <div className="w-8 h-1.5 bg-gray-100 dark:bg-zinc-800 rounded-full overflow-hidden">
                                    <div className="h-full bg-blue-500 rounded-full" style={{ width: `${score}%` }}></div>
                                </div>
                                <span className="text-[10px] font-bold text-blue-600 dark:text-blue-400">{score}%</span>
                            </div>
                            <div className="flex items-center gap-2">
                                <button className="p-1.5 hover:bg-gray-100 dark:hover:bg-zinc-800 rounded-lg text-gray-400 hover:text-blue-500 transition-colors">
                                    <i data-lucide="share-2" className="w-3.5 h-3.5"></i>
                                </button>
                                <button className="p-1.5 hover:bg-gray-100 dark:hover:bg-zinc-800 rounded-lg text-gray-400 hover:text-blue-500 transition-colors">
                                    <i data-lucide="external-link" className="w-3.5 h-3.5"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    {/* Mac Style Sheet (Modal) simulation on click */}
                    {showDetail && (
                        <div 
                            className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm animate-fade-in"
                            onClick={(e) => { e.stopPropagation(); setShowDetail(false); }}
                        >
                            <div 
                                className="bg-white dark:bg-[#1e1e1e] w-full max-w-2xl rounded-3xl shadow-2xl overflow-hidden animate-fade-in"
                                onClick={(e) => e.stopPropagation()}
                                style={{ animationDuration: '0.3s' }}
                            >
                                <div className="h-1.5 bg-blue-600 w-full"></div>
                                <div className="p-8">
                                    <div className="flex justify-between items-start mb-6">
                                        <div>
                                            <span className="text-blue-600 text-xs font-bold uppercase tracking-widest">{category}</span>
                                            <h2 className="text-3xl font-black mt-2 leading-tight">{title}</h2>
                                        </div>
                                        <button 
                                            onClick={() => setShowDetail(false)}
                                            className="p-2 hover:bg-gray-100 dark:hover:bg-zinc-800 rounded-full transition-colors"
                                        >
                                            <i data-lucide="x" className="w-6 h-6"></i>
                                        </button>
                                    </div>
                                    
                                    <div className="flex items-center gap-4 mb-8">
                                        <div className="flex items-center gap-2">
                                            <div className="w-8 h-8 rounded-full bg-blue-100 dark:bg-blue-900/30 flex items-center justify-center font-bold text-blue-600">
                                                {source[0]}
                                            </div>
                                            <span className="font-bold">{source}</span>
                                        </div>
                                        <div className="w-1 h-1 bg-gray-300 rounded-full"></div>
                                        <span className="text-gray-500">{time}</span>
                                        <div className="w-1 h-1 bg-gray-300 rounded-full"></div>
                                        <div className="flex items-center gap-1.5 px-3 py-1 bg-green-50 dark:bg-green-900/20 text-green-600 rounded-full text-xs font-bold">
                                            <i data-lucide="trending-up" className="w-3 h-3"></i>
                                            Score: {score}%
                                        </div>
                                    </div>

                                    <div className="prose dark:prose-invert max-w-none text-gray-700 dark:text-zinc-300 leading-relaxed mb-10">
                                        <p className="text-xl mb-4 font-medium">{summary}</p>
                                        <p>This is a detailed view simulation. In a real application, this would contain the full article text, additional metadata, sentiment analysis, and related news links harvested by Grabby's engine.</p>
                                        <p>Grabby uses advanced semantic clustering to group similar events and provides a single source of truth for the most important AI developments of the day.</p>
                                    </div>

                                    <div className="flex gap-4">
                                        <button className="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-xl shadow-blue-500/20 transition-all active:scale-[0.98]">
                                            Open Original Article
                                        </button>
                                        <button className="px-6 border-2 border-gray-100 dark:border-zinc-800 hover:bg-gray-50 dark:hover:bg-zinc-800 rounded-2xl font-bold transition-all">
                                            <i data-lucide="bookmark" className="w-5 h-5"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize Lucide icons
        const initIcons = () => {
            if (window.lucide) {
                window.lucide.createIcons();
            } else {
                setTimeout(initIcons, 100);
            }
        };
        initIcons();

        // Re-run icon initialization whenever the DOM changes (e.g. for modal)
        const observer = new MutationObserver(() => {
            if (window.lucide) window.lucide.createIcons();
        });
        observer.observe(document.getElementById('root'), { childList: true, subtree: true });
    </script>
</body>
</html>
