# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: grabby

before:
  hooks:
    - go mod tidy

builds:
  - id: grabby
    dir: go-cli
    main: .
    binary: grabby
    ldflags:
      - -s -w
      - -X github.com/gusibi/mcp-web-capture/go-cli/cmd.version={{ .Version }}
      - -X github.com/gusibi/mcp-web-capture/go-cli/cmd.commit={{ .Commit }}
      - -X github.com/gusibi/mcp-web-capture/go-cli/cmd.date={{ .Date }}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: grabby
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: gusibi
    name: mcp-web-capture
  header: |
    ## Grabby CLI {{ .Version }}

    ### 安装

    ```bash
    curl -fsSL https://raw.githubusercontent.com/gusibi/mcp-web-capture/main/scripts/install.sh | bash
    ```

    ### 下载

    根据你的系统下载对应的压缩包，解压后将 `grabby` 加入 `$PATH`。